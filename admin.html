<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Sim7 Viagens Analytics</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230077B6'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='14' fill='white'%3ES7%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --azul: #0077B6;
      --azul-escuro: #023E8A;
      --azul-light: #E8F4FD;
      --verde: #25D366;
      --dourado: #F4A261;
      --vermelho: #E74C3C;
      --texto: #1A1A2E;
      --texto-sub: #5A6275;
      --bg: #F5F7FA;
      --card: #FFFFFF;
      --borda: #E8ECF1;
      --raio: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
    }

    /* ====== LOGIN ====== */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, var(--azul-escuro), var(--azul));
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .login-overlay.hidden { display: none; }

    .login-box {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-box h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--azul-escuro);
    }
    .login-box p {
      font-size: 13px;
      color: var(--texto-sub);
      margin-bottom: 24px;
    }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--borda);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    .login-box input:focus { border-color: var(--azul); }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: var(--azul);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: var(--azul-escuro); }
    .login-error {
      color: var(--vermelho);
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* ====== HEADER ====== */
    .admin-header {
      background: linear-gradient(160deg, var(--azul-escuro), var(--azul));
      color: white;
      padding: 20px 24px;
    }
    .admin-header h1 {
      font-size: 18px;
      font-weight: 700;
    }
    .admin-header p {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 2px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .header-actions button, .header-actions select {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: white;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
    }
    .header-actions select option { color: var(--texto); background: white; }
    .header-actions button:hover { background: rgba(255,255,255,0.2); }
    .btn-logout {
      margin-left: auto;
      background: rgba(231,76,60,0.2) !important;
      border-color: rgba(231,76,60,0.4) !important;
    }

    /* ====== CONTEÚDO ====== */
    .admin-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ====== CARDS DE MÉTRICAS ====== */
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    @media (min-width: 600px) {
      .metrics { grid-template-columns: repeat(4, 1fr); }
    }
    .metric-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: var(--raio);
      padding: 14px;
    }
    .metric-card .label {
      font-size: 11px;
      color: var(--texto-sub);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .metric-card .value {
      font-size: 24px;
      font-weight: 700;
      color: var(--azul-escuro);
    }
    .metric-card .change {
      font-size: 10px;
      font-weight: 600;
      margin-top: 2px;
    }
    .metric-card .change.up { color: var(--verde); }
    .metric-card .change.down { color: var(--vermelho); }

    /* ====== SEÇÕES ====== */
    .section {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: var(--raio);
      padding: 16px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--azul-escuro);
    }

    /* ====== RANKING DE BOTÕES ====== */
    .rank-item {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--borda);
    }
    .rank-item:last-child { border: none; }
    .rank-pos {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--azul-light);
      color: var(--azul);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .rank-pos.gold { background: #FFF3CD; color: #D4A017; }
    .rank-pos.silver { background: #E8E8E8; color: #666; }
    .rank-pos.bronze { background: #FDEBD0; color: #B87333; }
    .rank-name {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
    }
    .rank-count {
      font-size: 14px;
      font-weight: 700;
      color: var(--azul);
      margin-right: 10px;
    }
    .rank-bar-bg {
      width: 80px;
      height: 6px;
      background: var(--borda);
      border-radius: 3px;
      overflow: hidden;
    }
    .rank-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--azul), var(--azul-escuro));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* ====== GRÁFICO ====== */
    .chart-container {
      width: 100%;
      height: 200px;
      position: relative;
    }
    .chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* ====== TABELA ====== */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    th {
      text-align: left;
      padding: 8px 6px;
      font-weight: 600;
      color: var(--texto-sub);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--borda);
      white-space: nowrap;
    }
    td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--borda);
      white-space: nowrap;
    }
    tr:hover td { background: var(--azul-light); }

    .badge-platform {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-platform.ios { background: #E8E8E8; color: #333; }
    .badge-platform.android { background: #E8F5E9; color: #2E7D32; }
    .badge-platform.desktop { background: var(--azul-light); color: var(--azul); }

    /* ====== LOADING ====== */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--texto-sub);
      font-size: 13px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--borda);
      border-top-color: var(--azul);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ====== EMPTY STATE ====== */
    .empty {
      text-align: center;
      padding: 30px;
      color: var(--texto-sub);
      font-size: 13px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .pagination button {
      padding: 6px 14px;
      border: 1px solid var(--borda);
      background: var(--card);
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    .pagination button:hover { background: var(--azul-light); }
    .pagination button:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

  <!-- ====== TELA DE LOGIN ====== -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h1>🔒 Admin Sim7</h1>
      <p>Painel de analytics do Linktree</p>
      <input type="password" id="loginPass" placeholder="Senha de acesso" autocomplete="off">
      <button onclick="doLogin()">Entrar</button>
      <div class="login-error" id="loginError">Senha incorreta</div>
    </div>
  </div>

  <!-- ====== HEADER ====== -->
  <header class="admin-header">
    <h1>📊 Analytics — Sim7 Viagens</h1>
    <p>Painel de cliques do Linktree</p>
    <div class="header-actions">
      <select id="filterPeriod" onchange="loadData()">
        <option value="7">Últimos 7 dias</option>
        <option value="30" selected>Últimos 30 dias</option>
        <option value="90">Últimos 90 dias</option>
        <option value="all">Todo período</option>
      </select>
      <button onclick="loadData()">⟳ Atualizar</button>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </header>

  <!-- ====== CONTEÚDO ====== -->
  <main class="admin-content" id="mainContent">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      Carregando dados...
    </div>

    <!-- Métricas -->
    <div class="metrics" id="metricsSection" style="display:none">
      <div class="metric-card">
        <div class="label">Hoje</div>
        <div class="value" id="metricToday">0</div>
      </div>
      <div class="metric-card">
        <div class="label">7 dias</div>
        <div class="value" id="metric7d">0</div>
      </div>
      <div class="metric-card">
        <div class="label">30 dias</div>
        <div class="value" id="metric30d">0</div>
      </div>
      <div class="metric-card">
        <div class="label">Total</div>
        <div class="value" id="metricTotal">0</div>
      </div>
    </div>

    <!-- Ranking -->
    <div class="section" id="rankingSection" style="display:none">
      <div class="section-title">🏆 Ranking de Botões</div>
      <div id="rankingList"></div>
    </div>

    <!-- Gráfico -->
    <div class="section" id="chartSection" style="display:none">
      <div class="section-title">📈 Cliques por Dia</div>
      <div class="chart-container">
        <canvas id="chartCanvas"></canvas>
      </div>
    </div>

    <!-- Tabela de últimos cliques -->
    <div class="section" id="tableSection" style="display:none">
      <div class="section-title">📋 Últimos Cliques</div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Botão</th>
              <th>Data/Hora</th>
              <th>Plataforma</th>
              <th>Navegador</th>
              <th>Tela</th>
              <th>Idioma</th>
            </tr>
          </thead>
          <tbody id="clicksTable"></tbody>
        </table>
      </div>
      <div class="pagination">
        <button id="btnPrev" onclick="changePage(-1)" disabled>← Anterior</button>
        <button id="btnNext" onclick="changePage(1)">Próxima →</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    /* ================================================
       CONFIGURAÇÃO — mesmas credenciais do index.html
       ================================================ */
    var SUPABASE_URL = 'https://lqsjmghjmpjlynlmtqgx.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_JJxm2JjCAESROq7_S69vog_idq_mOhk';

    /* ====== SENHA DO ADMIN (troque aqui) ====== */
    var ADMIN_PASSWORD = 'sim7admin2026';

    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var currentPage = 0;
    var pageSize = 30;

    /* ================================================
       LOGIN
       ================================================ */
    function doLogin() {
      var pass = document.getElementById('loginPass').value;
      if (pass === ADMIN_PASSWORD) {
        document.getElementById('loginOverlay').classList.add('hidden');
        sessionStorage.setItem('sim7admin', '1');
        loadData();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginPass').value = '';
      }
    }
    document.getElementById('loginPass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    function doLogout() {
      sessionStorage.removeItem('sim7admin');
      document.getElementById('loginOverlay').classList.remove('hidden');
      document.getElementById('loginPass').value = '';
      document.getElementById('loginError').style.display = 'none';
    }
    // Auto-login se já logado na sessão
    if (sessionStorage.getItem('sim7admin') === '1') {
      document.getElementById('loginOverlay').classList.add('hidden');
      // loadData será chamado após DOMContentLoaded
    }

    /* ================================================
       CARREGAR DADOS
       ================================================ */
    async function loadData() {
      var loading = document.getElementById('loadingState');
      loading.style.display = 'block';

      try {
        // Período
        var period = document.getElementById('filterPeriod').value;
        var dateFilter = null;
        if (period !== 'all') {
          var d = new Date();
          d.setDate(d.getDate() - parseInt(period));
          dateFilter = d.toISOString();
        }

        // Buscar todos os cliques
        var query = sb.from('clicks').select('*').order('clicked_at', { ascending: false });
        if (dateFilter) query = query.gte('clicked_at', dateFilter);
        var { data: clicks, error } = await query.limit(5000);

        if (error) throw error;
        if (!clicks) clicks = [];

        // Métricas
        var now = new Date();
        var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
        var d7 = new Date(); d7.setDate(d7.getDate() - 7);
        var d30 = new Date(); d30.setDate(d30.getDate() - 30);

        var { count: totalCount } = await sb.from('clicks').select('*', { count: 'exact', head: true });

        document.getElementById('metricToday').textContent = clicks.filter(function(c) { return c.clicked_at >= todayStart; }).length;
        document.getElementById('metric7d').textContent = clicks.filter(function(c) { return c.clicked_at >= d7.toISOString(); }).length;
        document.getElementById('metric30d').textContent = clicks.filter(function(c) { return c.clicked_at >= d30.toISOString(); }).length;
        document.getElementById('metricTotal').textContent = totalCount || clicks.length;

        // Ranking
        var buttonCounts = {};
        clicks.forEach(function(c) {
          var name = c.button_name || 'Desconhecido';
          buttonCounts[name] = (buttonCounts[name] || 0) + 1;
        });
        var ranking = Object.entries(buttonCounts).sort(function(a, b) { return b[1] - a[1]; });
        var maxCount = ranking.length > 0 ? ranking[0][1] : 1;

        var rankHTML = '';
        ranking.forEach(function(item, i) {
          var posClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
          var pct = Math.round((item[1] / maxCount) * 100);
          rankHTML += '<div class="rank-item">' +
            '<div class="rank-pos ' + posClass + '">' + (i + 1) + '</div>' +
            '<div class="rank-name">' + item[0] + '</div>' +
            '<div class="rank-count">' + item[1] + '</div>' +
            '<div class="rank-bar-bg"><div class="rank-bar" style="width:' + pct + '%"></div></div>' +
            '</div>';
        });
        document.getElementById('rankingList').innerHTML = rankHTML || '<div class="empty">Nenhum clique ainda</div>';

        // Gráfico
        drawChart(clicks);

        // Tabela
        currentPage = 0;
        renderTable(clicks);

        // Mostrar seções
        document.getElementById('metricsSection').style.display = '';
        document.getElementById('rankingSection').style.display = '';
        document.getElementById('chartSection').style.display = '';
        document.getElementById('tableSection').style.display = '';
        loading.style.display = 'none';

      } catch (err) {
        loading.innerHTML = '<div class="empty">Erro ao carregar: ' + err.message + '</div>';
      }
    }

    /* ================================================
       GRÁFICO SIMPLES (Canvas)
       ================================================ */
    function drawChart(clicks) {
      var canvas = document.getElementById('chartCanvas');
      var ctx = canvas.getContext('2d');
      var rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * 2;
      canvas.height = rect.height * 2;
      ctx.scale(2, 2);
      var W = rect.width;
      var H = rect.height;

      // Agrupar por dia (últimos 30 dias)
      var days = {};
      var labels = [];
      for (var i = 29; i >= 0; i--) {
        var d = new Date();
        d.setDate(d.getDate() - i);
        var key = d.toISOString().split('T')[0];
        days[key] = 0;
        labels.push(key);
      }
      clicks.forEach(function(c) {
        var day = c.clicked_at.split('T')[0];
        if (days[day] !== undefined) days[day]++;
      });

      var values = labels.map(function(l) { return days[l]; });
      var maxVal = Math.max.apply(null, values) || 1;

      // Fundo
      ctx.clearRect(0, 0, W, H);

      var padL = 30, padR = 10, padT = 10, padB = 30;
      var chartW = W - padL - padR;
      var chartH = H - padT - padB;
      var barW = chartW / values.length;

      // Grid
      ctx.strokeStyle = '#E8ECF1';
      ctx.lineWidth = 0.5;
      for (var g = 0; g <= 4; g++) {
        var gy = padT + chartH - (chartH * g / 4);
        ctx.beginPath();
        ctx.moveTo(padL, gy);
        ctx.lineTo(W - padR, gy);
        ctx.stroke();
        ctx.fillStyle = '#8892A5';
        ctx.font = '9px Poppins';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(maxVal * g / 4), padL - 4, gy + 3);
      }

      // Barras + linha
      ctx.beginPath();
      values.forEach(function(v, i) {
        var x = padL + i * barW + barW / 2;
        var y = padT + chartH - (v / maxVal) * chartH;

        // Barra
        var bh = (v / maxVal) * chartH;
        ctx.fillStyle = 'rgba(0, 119, 182, 0.15)';
        ctx.fillRect(padL + i * barW + 2, padT + chartH - bh, barW - 4, bh);

        // Linha
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = '#0077B6';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Dots
      values.forEach(function(v, i) {
        var x = padL + i * barW + barW / 2;
        var y = padT + chartH - (v / maxVal) * chartH;
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#0077B6';
        ctx.fill();
      });

      // Labels do eixo X (a cada 5 dias)
      ctx.fillStyle = '#8892A5';
      ctx.font = '8px Poppins';
      ctx.textAlign = 'center';
      labels.forEach(function(l, i) {
        if (i % 5 === 0 || i === labels.length - 1) {
          var x = padL + i * barW + barW / 2;
          ctx.fillText(l.slice(5), x, H - 8); // MM-DD
        }
      });
    }

    /* ================================================
       TABELA DE CLIQUES
       ================================================ */
    var allClicks = [];
    function renderTable(clicks) {
      if (clicks) allClicks = clicks;
      var start = currentPage * pageSize;
      var pageClicks = allClicks.slice(start, start + pageSize);

      var html = '';
      pageClicks.forEach(function(c) {
        var dt = new Date(c.clicked_at);
        var dateStr = dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        var platform = c.platform || '—';
        var badgeClass = platform.toLowerCase().includes('ios') ? 'ios' :
                         platform.toLowerCase().includes('android') ? 'android' : 'desktop';
        var browser = c.browser || '—';
        var screen = c.screen_width && c.screen_height ? c.screen_width + '×' + c.screen_height : '—';

        html += '<tr>' +
          '<td><strong>' + (c.button_name || '—') + '</strong></td>' +
          '<td>' + dateStr + '</td>' +
          '<td><span class="badge-platform ' + badgeClass + '">' + platform + '</span></td>' +
          '<td>' + browser + '</td>' +
          '<td>' + screen + '</td>' +
          '<td>' + (c.language || '—') + '</td>' +
          '</tr>';
      });

      document.getElementById('clicksTable').innerHTML = html || '<tr><td colspan="6" style="text-align:center;padding:20px">Nenhum clique registrado</td></tr>';
      document.getElementById('btnPrev').disabled = currentPage === 0;
      document.getElementById('btnNext').disabled = start + pageSize >= allClicks.length;
    }

    function changePage(dir) {
      currentPage += dir;
      renderTable();
    }

    /* ================================================
       INIT
       ================================================ */
    document.addEventListener('DOMContentLoaded', function() {
      if (sessionStorage.getItem('sim7admin') === '1') {
        loadData();
      }
    });
  </script>
</body>
</html>
